name: AGUI LangGraph FastMCP CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend – Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend
        run: |
          cd backend
          ruff app

      - name: Backend import check (CI-safe)
        run: |
          cd backend
          python - <<EOF
          from app.graph.graph import graph
          print("Backend graph import OK")
          EOF

  tools:
    name: Tools – Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools deps
        run: |
          cd tools
          pip install -r requirements.txt
          pip install ruff

      - name: Lint tools
        run: |
          cd tools
          ruff .

      - name: Tools import check
        run: |
          cd tools
          python - <<EOF
          import server
          print("FastMCP tools import OK")
          EOF

  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
