services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
    depends_on:
      - tools

  tools:
    build:
      context: ./tools
    ports:
      - "9000:9000"
    environment:
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}

  frontend:
    build:
      context: ./frontend   # 👈 MUST point to folder with Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

